spring:
  application:
    name: products-service
  datasource:
    url: ${DB_URL:jdbc:mysql://db:3306/Game_Store_System?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8}
    username: ${DB_USERNAME:gamestore_user}
    password: ${DB_PASSWORD:gamestore_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:production}
server:
  port: 8081
aws:
  region: ${AWS_REGION:eu-west-1}
  access-key-id: ${AWS_ACCESS_KEY_ID}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY}
  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:game-and-music-files}
logging:
  level:
    com.example.products: WARN
