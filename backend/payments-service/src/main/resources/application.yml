spring:
  application:
    name: payments-service
  datasource:
    url: ${DB_URL:jdbc:mysql://db:3306/Game_Store_System?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:gamestore_user}
    password: ${DB_PASSWORD:gamestore_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:production}
server:
  port: 8083
app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
logging:
  level:
    com.example.payments: WARN
paypal:
  client:
    id: ${PAYPAL_CLIENT_ID}
    secret: ${PAYPAL_CLIENT_SECRET}
  mode: ${PAYPAL_MODE:sandbox}
