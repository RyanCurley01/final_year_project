spring:
  application:
    name: accounts-service
  
  datasource:
    # Connect to MySQL in the devcontainer
    url: jdbc:mysql://localhost:3306/Game_Store_System?createDatabaseIfNotExist=true
    username: gamestore_user
    password: gamestore_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  h2:
    console:
      enabled: true

server:
  port: 8081

logging:
  level:
    com.example.accounts: DEBUG
    org.springframework.web: DEBUG
