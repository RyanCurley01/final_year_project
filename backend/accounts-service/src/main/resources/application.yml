spring:
  application:
    name: accounts-service
  datasource:
    url: ${DB_URL:jdbc:mysql://db:3306/Game_Store_System?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:gamestore_user}
    password: ${DB_PASSWORD:gamestore_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  session:
    store-type: none
  h2:
    console:
      enabled: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:production}
server:
  port: 8080
logging:
  level:
    com.example.accounts: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
