spring:
  application:
    name: purchasedproducts-service
  datasource:
    url: ${DB_URL:jdbc:mysql://db:3306/Game_Store_System?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:gamestore_user}
    password: ${DB_PASSWORD:gamestore_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:production}
server:
  port: 8089
logging:
  level:
    com.example.purchasedproducts: WARN
