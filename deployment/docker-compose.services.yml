  audio-service:
    build:
      context: ../audio_service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      MODEL_PATH: /app/models/recommendation_model.onnx
      # AWS S3 credentials for presigned URLs
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: game-and-music-files
      # Database configuration - connects to db service on Docker network
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: gamestore_user
      MYSQL_PASSWORD: gamestore_pass
      MYSQL_DATABASE: Game_Store_System
