  audio-service:
    build:
      context: ../audio_service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    deploy:
      resources:
        limits:
          memory: 1G
    environment:
      MODEL_PATH: /app/models/recommendation_model.onnx
      # AWS S3 credentials for presigned URLs
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: game-and-music-files
      EXTERNAL_IMAGE_GENERATION_ENABLED: ${EXTERNAL_IMAGE_GENERATION_ENABLED:-true}
      UVICORN_RELOAD: "false"
      IMAGE_POOL_DEFAULT_SIZE: ${IMAGE_POOL_DEFAULT_SIZE:-80}
      IMAGE_POOL_MAX_TOTAL_BYTES: ${IMAGE_POOL_MAX_TOTAL_BYTES:-1700000000}
      IMAGE_POOL_ESTIMATED_AVG_IMAGE_BYTES: ${IMAGE_POOL_ESTIMATED_AVG_IMAGE_BYTES:-350000}
      # Database configuration - connects to db service on Docker network
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: Game_Store_System
      BACKEND_API_URL: http://products-service:8081
    depends_on:
      db:
        condition: service_healthy
    networks:
      - services-network
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  services-network:
    name: final_year_project_network
    external: true
