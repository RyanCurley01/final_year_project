version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/final_year_project:cached
      - vscode-extensions:/root/.vscode-server/extensions
      - vscode-extensions-insiders:/root/.vscode-server-insiders/extensions
    command: sleep infinity
    ports:
      - "5173:5173"   # Frontend (Vite dev server)
      - "3000:3000"   # Alternative frontend port
    environment:
      # Connect to external services network
      MYSQL_HOST: host.docker.internal
      MYSQL_PORT: 3306
      MYSQL_DATABASE: Game_Store_System
      MYSQL_USER: gamestore_user
      MYSQL_PASSWORD: gamestore_pass
      MYSQL_ROOT_PASSWORD: rootpassword
      CODESPACES: ${CODESPACES:-false}
      CODESPACE_NAME: ${CODESPACE_NAME:-}
      GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN: ${GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN:-}
    # No depends_on since services run externally
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G


  # NOTE: All backend services (accounts, products, orders, etc.) and database 
  # run externally via docker-compose.services.yml
  # Use ./services-control.sh to manage them
  # The dev container only runs the frontend development server

volumes:
  vscode-extensions:
  vscode-extensions-insiders:
