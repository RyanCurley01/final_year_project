version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/final_year_project:cached
      - vscode-extensions:/root/.vscode-server/extensions
      - vscode-extensions-insiders:/root/.vscode-server-insiders/extensions
    command: sleep infinity
    network_mode: service:db
    environment:
      MYSQL_HOST: localhost
      MYSQL_HOST: db
      #MYSQL_PORT: 3306
      MYSQL_DATABASE: Game_Store_System
      MYSQL_USER: gamestore_user
      MYSQL_PASSWORD: gamestore_pass
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: Game_Store_System
      MYSQL_USER: gamestore_user
      MYSQL_PASSWORD: gamestore_pass
    volumes:
      - mysql-data:/var/lib/mysql
      # Old path (when init script was in .devcontainer):
      #- ./init-database.sh:/docker-entrypoint-initdb.d/init-database.sh
      # New path pointing to init script in project root:
      - ../init-database.sh:/docker-entrypoint-initdb.d/init-database.sh
    #ports:
    #  - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  mysql-data:
  vscode-extensions:
  vscode-extensions-insiders:
