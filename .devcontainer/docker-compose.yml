  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: Game_Store_System
      MYSQL_USER: gamestore_user
      MYSQL_PASSWORD: gamestore_pass
    volumes:
      - mysql-data:/var/lib/mysql
      - ../init-database.sh:/docker-entrypoint-initdb.d/init-database.sh
    ports:
      - "3306:3306"  # Enable database port for Codespaces
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - app-network

volumes:
  mysql-data:
  vscode-extensions:
  vscode-extensions-insiders:

networks:
  app-network:
    driver: bridge
