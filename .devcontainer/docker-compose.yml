version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/final_year_project:cached
      - vscode-extensions:/root/.vscode-server/extensions
      - vscode-extensions-insiders:/root/.vscode-server-insiders/extensions
    command: sleep infinity
    ports:
      - "5000:5000"   # AI Service
      - "5173:5173"   # Frontend
      - "3000:3000"   # Alternative frontend port
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: Game_Store_System
      MYSQL_USER: gamestore_user
      MYSQL_PASSWORD: gamestore_pass
      MYSQL_ROOT_PASSWORD: rootpassword
      CODESPACES: ${CODESPACES:-false}
      CODESPACE_NAME: ${CODESPACE_NAME:-}
      GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN: ${GITHUB_CODESPACES_PORT_FORWARDING_DOMAIN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  accounts-service:
    build:
      context: ../backend
      dockerfile: ../backend/accounts-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/Game_Store_System?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: gamestore_user
      SPRING_DATASOURCE_PASSWORD: gamestore_pass
      JAVA_OPTS: "-Xmx256m -Xms128m -XX:MaxMetaspaceSize=128m"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

