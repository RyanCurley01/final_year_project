<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Animation - Three.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
        }
        
        #animation-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
    </style>
</head>
<body>
    <div id="animation-container"></div>

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Cloud Animation Script (cache-bust with timestamp) -->
    <script src="cloud-animation.js?v=24"></script>
    
    <script>
        // Initialize the cloud animator with the Windows XP image
        const animator = new CloudAnimator(
            'animation-container',
            './Windows%20Xp%20Cover%20Image.webp'
        );
    </script>
</body>
</html>
