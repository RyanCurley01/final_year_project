name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Backend Build and Test
  backend-build:
    name: Build & Test Backend Services
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: Game_Store_System
          MYSQL_USER: ${{ secrets.DB_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x backend/gradlew

    - name: Build all services
      working-directory: backend
      run: ./gradlew build --no-daemon

    - name: Run Unit Tests
      working-directory: backend
      run: ./gradlew test --no-daemon

    - name: Generate Test Coverage Report
      working-directory: backend
      run: ./gradlew jacocoTestReport --no-daemon

    - name: Upload Test Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: backend/**/build/reports/jacoco/test/jacocoTestReport.xml
        flags: backend
        name: backend-coverage
      continue-on-error: true

    - name: Archive Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results
        path: backend/**/build/test-results/
        retention-days: 30

    - name: Archive Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: backend-jars
        path: backend/**/build/libs/*.jar
        retention-days: 7

  # Frontend Build and Test
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Run Linter
      working-directory: frontend
      run: npm run lint
      continue-on-error: true

    - name: Build Frontend
      working-directory: frontend
      run: npm run build

    - name: Archive Frontend Build
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/
        retention-days: 7

  # AI Service Build and Test
  audio-service-build:
    name: Build & Test AI Service
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      working-directory: audio_service
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Python Tests
      working-directory: audio_service
      run: |
        pip install pytest pytest-cov
        pytest --cov=. --cov-report=xml || echo "No tests found"
      continue-on-error: true

  # API Testing with Postman (Optional)
  api-tests:
    name: Run API Tests
    runs-on: ubuntu-latest
    needs: [backend-build]
    if: github.event_name == 'push'
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: Game_Store_System
          MYSQL_USER: ${{ secrets.DB_USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Download Backend Artifacts
      uses: actions/download-artifact@v4
      with:
        name: backend-jars
        path: backend-jars

    - name: Start Backend Services
      run: |
        # Start services in background (simplified - adjust for your setup)
        echo "Services would start here in real deployment"
      continue-on-error: true

    - name: Install Newman (Postman CLI)
      run: npm install -g newman newman-reporter-htmlextra

    - name: Run Postman Collection
      if: false  # Enable when you have Postman collections
      run: |
        newman run postman_collection.json \
          -e postman_environment.json \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export newman-report.html
      continue-on-error: true

  # Docker Build (Optional)
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, audio-service-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub (Optional)
      if: false  # Enable when you set up Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Docker Images
      run: |
        docker compose -f deployment/docker-compose.services.yml build
      continue-on-error: true

  # Deploy to AWS (Optional)
  deploy-aws:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, audio-service-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Backend Artifacts
      uses: actions/download-artifact@v4
      with:
        name: backend-jars
        path: artifacts/backend

    - name: Download Frontend Artifacts
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: artifacts/frontend

    - name: Configure AWS Credentials
      if: false  # Enable when you set up AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-1

    - name: Deploy to EC2
      if: false  # Enable when ready to deploy
      run: |
        echo "Deployment commands would go here"
        # Example: rsync or scp files to EC2
        # ssh to EC2 and restart services
      continue-on-error: true

    - name: Deploy Frontend to S3 (Optional)
      if: false  # Enable when you set up S3 hosting
      run: |
        aws s3 sync artifacts/frontend s3://your-bucket-name --delete
        aws cloudfront create-invalidation --distribution-id YOUR_DIST_ID --paths "/*"
      continue-on-error: true
